# ConfigurańŃo Flow Panel

- id: link_dados
  type: stroke
  metric: 'PortaSFP1'
  thresholds:
    - color: "#22c55e" # Verde se UP (Valor 1)
      level: 1
    - color: "#ef4444" # Vermelho se DOWN (Valor 0)
      level: 0

- id: link_oficina
  type: stroke
  metric: 'PortaSFP3'
  thresholds:
    - color: "#22c55e" # Verde se UP (Valor 1)
      level: 1
    - color: "#ef4444" # Vermelho se DOWN (Valor 0)
      level: 0
